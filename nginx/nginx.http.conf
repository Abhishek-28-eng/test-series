# Temporary HTTP-only Nginx config — used BEFORE SSL cert is issued
# After cert is issued, this is replaced by nginx/nginx.conf
server {
    listen 80;
    server_name devwithabhi.de www.devwithabhi.de;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
    }
}
