services:

  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: testseries_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Node.js Backend (GHCR image) ────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_OWNER}/testseries-backend:latest
    container_name: testseries_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:      db
      DB_PORT:      3306
      NODE_ENV:     production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # ── React Frontend (GHCR image with Nginx) ──────────────────
  frontend:
    image: ghcr.io/${GITHUB_OWNER}/testseries-frontend:latest
    container_name: testseries_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app_network

  # ── Certbot SSL Auto-renewal ────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: testseries_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app_network

volumes:
  db_data:
  uploads_data:
  certbot_conf:
  certbot_www:

networks:
  app_network:
    driver: bridge
