name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      # ─── 1. Checkout code ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Lowercase the repository owner (GHCR requirement) ─
      - name: Set lowercase image owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ─── 3. Set up Docker Buildx ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── 4. Log in to GHCR ────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── 5. Build & Push Backend image ───────────────────────
      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/testseries-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── 6. Build & Push Frontend image ─────────────────────
      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/testseries-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── 7. SSH into EC2 and deploy ──────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/testseries

            # Set lowercase owner
            OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')

            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker pull ghcr.io/${OWNER}/testseries-backend:latest
            docker pull ghcr.io/${OWNER}/testseries-frontend:latest

            # Update GITHUB_OWNER in .env for docker-compose
            sed -i "s|^GITHUB_OWNER=.*|GITHUB_OWNER=${OWNER}|" .env

            # Restart backend and frontend (keep DB running)
            docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend

            # Remove dangling images to free disk space
            docker image prune -f

            echo "✅ Deployment complete!"
