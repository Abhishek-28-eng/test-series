name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      # ─── 1. Checkout code ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Set up Docker Buildx ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── 3. Log in to GHCR ────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── 4. Build & Push Backend image ───────────────────────
      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/testseries-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── 5. Build & Push Frontend image ─────────────────────
      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/testseries-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── 6. SSH into EC2 and deploy ──────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_ACTOR,GITHUB_TOKEN
          script: |
            set -e
            cd /opt/testseries

            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker pull ghcr.io/${{ github.repository_owner }}/testseries-backend:latest
            docker pull ghcr.io/${{ github.repository_owner }}/testseries-frontend:latest

            # Restart only backend and frontend (keep DB running)
            docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend

            # Remove dangling images to free disk space
            docker image prune -f

            echo "✅ Deployment complete!"
